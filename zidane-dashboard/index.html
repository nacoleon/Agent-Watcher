<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidane Watcher</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>Zidane</h1>
        <span class="subtitle">OpenClaw Desk Companion</span>
    </div>
    <main>
        <div class="sprite-display">
            <div class="watch-bezel">
                <div class="watch-screen" id="watch-screen">
                    <canvas id="sprite-canvas" width="412" height="412"></canvas>
                </div>
            </div>
        </div>
        <div style="text-align:center">
            <div class="state-badge" id="state-badge">idle</div>
        </div>
        <div class="status-card">
            <div class="stat">
                <span class="label">Person</span>
                <span id="person-status">--</span>
            </div>
            <div class="stat">
                <span class="label">Uptime</span>
                <span id="uptime">--</span>
            </div>
            <div class="stat">
                <span class="label">WiFi RSSI</span>
                <span id="rssi">--</span>
            </div>
            <div class="stat">
                <span class="label">Last Msg</span>
                <span id="last-msg">--</span>
            </div>
        </div>

        <h2>State Control</h2>
        <div class="state-controls" id="state-controls"></div>

        <h2>Send Message</h2>
        <div class="message-input">
            <input type="text" id="msg-input" placeholder="Type a message..." maxlength="280">
            <button onclick="sendMessage()">Send</button>
        </div>

        <h2>Timeline</h2>
        <div id="timeline"></div>

        <div style="margin-top:24px; text-align:center;">
            <button onclick="rebootWatcher()" style="background:#AA5555; color:#fff; padding:10px 24px;">Reboot Watcher</button>
        </div>
    </main>
    <script>
        let spriteImg = null;
        let framesData = null;
        let currentState = 'idle';

        // Animation state
        let animFrame = 0;
        let animName = 'idle_down';
        let animTimer = null;

        const CANVAS_SIZE = 412;
        const DRAW_SCALE = 4;  // FFRK sprites are 16x24, scale to 64x96
        const SPRITE_HALF = 8 * DRAW_SCALE;
        const CENTER = CANVAS_SIZE / 2;
        const MOVE_RADIUS = CENTER - SPRITE_HALF - 15;

        let posX = CENTER, posY = CENTER;
        let facing = 'down';
        let state = 'idle';
        let stateTimer = 0;
        let walkDir = { x: 0, y: 0 };
        let walkStepsLeft = 0;

        // Agent state behaviors (matching firmware)
        const STATE_BEHAVIOR = {
            idle:      { walkChance: 0.03, turnChance: 0.02, walkSteps: [6,14],  speed: 1.5, bounceAmp: 0, pauseTicks: [30,80],  bgColor: '#FDE8C8' },
            working:   { walkChance: 0.05, turnChance: 0.03, walkSteps: [8,16],  speed: 1.5, bounceAmp: 0, pauseTicks: [20,50],  bgColor: '#E8F0E8' },
            waiting:   { walkChance: 0.005,turnChance: 0.015,walkSteps: [2,5],   speed: 0.8, bounceAmp: 0, pauseTicks: [80,200], bgColor: '#E8E0F0' },
            alert:     { walkChance: 0, turnChance: 0, walkSteps: [0,0], speed: 0, bounceAmp: 0, pauseTicks: [100,200],   bgColor: '#402020' },
            greeting:  { walkChance: 0, turnChance: 0, walkSteps: [0,0],  speed: 0, bounceAmp: 0, pauseTicks: [100,200],  bgColor: '#FFF0C0' },
            sleeping:  { walkChance: 0.003,turnChance: 0.005,walkSteps: [2,5],   speed: 0.5, bounceAmp: 0, pauseTicks: [100,250],bgColor: '#404060' },
            reporting: { walkChance: 0.01, turnChance: 0.01, walkSteps: [3,6],   speed: 1.0, bounceAmp: 0, pauseTicks: [50,100], bgColor: '#FDE8C8' },
            down:      { walkChance: 0, turnChance: 0, walkSteps: [0,0], speed: 0, bounceAmp: 0, pauseTicks: [100,200], bgColor: '#2a2a2a' },
        };

        // Background images per state (12 each, indices into backgrounds sheet)
        // Grid: 6 cols x 14 rows, each 240x170, 1px white separators
        // Position: col_starts=[1,242,483,724,965,1206], row_starts=[1,172,343,514,685,856,1027,1198,1369,1540,1711,1882,2053,2224]
        const BG_COL_STARTS = [1, 242, 483, 724, 965, 1206];
        const BG_ROW_STARTS = [1, 172, 343, 514, 685, 856, 1027, 1198, 1369, 1540, 1711, 1882, 2053, 2224];
        const BG_CELL_W = 240, BG_CELL_H = 170;

        function bgPos(idx) {
            const col = idx % 6, row = Math.floor(idx / 6);
            return { x: BG_COL_STARTS[col], y: BG_ROW_STARTS[row] };
        }

        const STATE_BGS = {
            // Peaceful greens, fields, meadows, calm nature
            idle:      [2, 5, 10, 11, 15, 27, 42, 50, 70, 71, 75, 25],
            // Interiors, castles, structured spaces, active feel
            working:   [26, 30, 31, 37, 44, 46, 33, 81, 20, 41, 12, 59],
            // Skies, clouds, ethereal, cool blues, patient
            waiting:   [28, 32, 36, 45, 54, 55, 66, 68, 79, 83, 6, 75],
            // Fire, lava, red/warm, danger, dark dramatic
            alert:     [8, 13, 38, 39, 48, 53, 56, 58, 60, 61, 76, 29],
            // Bright, warm, cheerful, golden, welcoming
            greeting:  [1, 6, 17, 29, 40, 49, 51, 52, 64, 72, 74, 50],
            // Dark, night, deep blues, tranquil, moonlit
            sleeping:  [3, 4, 24, 33, 34, 35, 43, 47, 62, 63, 69, 77],
            // Formal, temples, grand halls, structured
            reporting: [7, 12, 16, 20, 41, 57, 59, 78, 80, 10, 46, 83],
        };

        let bgSheetImg = null;
        let currentBgIdx = 0;
        let lastBgChangeState = '';

        const DIRS = ['down', 'up', 'left', 'right'];
        const DIR_VEC = { down: {x:0,y:1}, up: {x:0,y:-1}, left: {x:-1,y:0}, right: {x:1,y:0} };

        function getAnim(name) {
            return framesData && framesData.animations && framesData.animations[name];
        }
        function setAnim(name) {
            if (animName === name) return;
            animName = name;
            animFrame = 0;
        }

        function clampPos() {
            // Circular boundary
            const dx = posX - CENTER;
            const dy = posY - CENTER;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > MOVE_RADIUS) {
                const scale = MOVE_RADIUS / dist;
                posX = CENTER + dx * scale;
                posY = CENTER + dy * scale;
            }
        }

        function atBoundary() {
            const dx = posX - CENTER;
            const dy = posY - CENTER;
            return Math.sqrt(dx * dx + dy * dy) >= MOVE_RADIUS - 5;
        }

        const OPPOSITE = { down: 'up', up: 'down', left: 'right', right: 'left' };
        let lastWalkDir = '';  // track last walk direction to avoid reversals

        function pickWalkDir() {
            const toCenter = { x: CENTER - posX, y: CENTER - posY };
            const dist = Math.sqrt(toCenter.x * toCenter.x + toCenter.y * toCenter.y);
            let newFacing;
            if (dist > 40 && Math.random() < 0.6) {
                // Drift back toward center when far out
                newFacing = Math.abs(toCenter.x) > Math.abs(toCenter.y)
                    ? (toCenter.x > 0 ? 'right' : 'left')
                    : (toCenter.y > 0 ? 'down' : 'up');
            } else {
                // Pick a random direction, but never the exact opposite of last walk
                const choices = DIRS.filter(d => d !== OPPOSITE[lastWalkDir]);
                newFacing = choices[Math.floor(Math.random() * choices.length)];
            }
            facing = newFacing;
            lastWalkDir = newFacing;
            walkDir = DIR_VEC[facing];
        }

        // States with dedicated animations (skip walk/idle behavior)
        const FIXED_ANIM_STATES = {
            sleeping: 'sleeping',
            alert: 'alert',
            reporting: 'reporting',
            waiting: 'waiting',
            greeting: 'greeting',
            down: 'down',
            working: 'working',
        };

        function behaviorTick() {
            const b = STATE_BEHAVIOR[currentState] || STATE_BEHAVIOR.idle;
            stateTimer++;

            // Fixed-animation states: no wandering, lock to center, just play the animation
            if (FIXED_ANIM_STATES[currentState]) {
                setAnim(FIXED_ANIM_STATES[currentState]);
                posX = CENTER;
                posY = CENTER;
                return;
            }

            switch (state) {
            case 'idle':
                setAnim('idle_' + facing);
                if (Math.random() < b.walkChance) {
                    pickWalkDir();
                    const [min, max] = b.walkSteps;
                    walkStepsLeft = min + Math.floor(Math.random() * (max - min));
                    state = 'walking'; stateTimer = 0;
                }
                break;
            case 'walking':
                setAnim('walk_' + facing);
                posX += walkDir.x * b.speed;
                posY += walkDir.y * b.speed;
                clampPos();
                walkStepsLeft--;
                if (walkStepsLeft <= 0 || atBoundary()) {
                    state = 'pausing'; stateTimer = 0;
                    setAnim('idle_' + facing);
                }
                break;
            case 'pausing':
                setAnim('idle_' + facing);
                const [pMin, pMax] = b.pauseTicks;
                if (stateTimer > pMin + Math.random() * (pMax - pMin)) {
                    state = 'idle'; stateTimer = 0;
                }
                break;
            }
        }

        let frameTick = 0;
        function drawFrame() {
            if (!spriteImg || !framesData) return;
            behaviorTick();
            clampPos();

            const canvas = document.getElementById('sprite-canvas');
            const ctx = canvas.getContext('2d');
            const anim = getAnim(animName);
            if (!anim) return;

            const frame = anim.frames[animFrame];
            // Per-frame width override (sleeping frames are 15px wide)
            const fw = frame.w || framesData.frame_width;
            const fh = frame.h || framesData.frame_height;

            const b = STATE_BEHAVIOR[currentState] || STATE_BEHAVIOR.idle;

            // States that show the FF9 dialog box (sprite shifts up)
            const DIALOG_STATES = ['alert', 'greeting', 'reporting'];
            const hasDialog = DIALOG_STATES.includes(currentState);

            // Background: use sprite sheet BG if loaded, fallback to solid color
            if (bgSheetImg && STATE_BGS[currentState]) {
                // Pick a new BG when state changes
                if (currentState !== lastBgChangeState) {
                    const bgs = STATE_BGS[currentState];
                    currentBgIdx = bgs[Math.floor(Math.random() * bgs.length)];
                    lastBgChangeState = currentState;
                }
                const bp = bgPos(currentBgIdx);
                // Draw background scaled to fill canvas
                ctx.drawImage(bgSheetImg, bp.x, bp.y, BG_CELL_W, BG_CELL_H, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
            } else {
                ctx.fillStyle = b.bgColor;
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            }

            // Bounce
            const bounceY = b.bounceAmp > 0 ? Math.sin(frameTick * 0.3) * b.bounceAmp : 0;

            // Shift sprite up when dialog is visible
            const dialogShiftY = hasDialog ? 95 : 0;

            const drawW = fw * DRAW_SCALE;
            const drawH = fh * DRAW_SCALE;
            const drawX = posX - drawW / 2;
            const drawY = posY - drawH / 2 + bounceY + dialogShiftY;

            ctx.imageSmoothingEnabled = false;
            if (anim.mirror) {
                ctx.save();
                ctx.translate(drawX + drawW, drawY);
                ctx.scale(-1, 1);
                ctx.drawImage(spriteImg, frame.x, frame.y, fw, fh, 0, 0, drawW, drawH);
                ctx.restore();
            } else {
                ctx.drawImage(spriteImg, frame.x, frame.y, fw, fh, drawX, drawY, drawW, drawH);
            }

            // --- Status bubbles and overlays ---

            // ZZZ for sleeping — floating z's that drift upward
            if (currentState === 'sleeping') {
                const t = frameTick * 0.04;
                ctx.font = 'bold 16px monospace';
                for (let i = 0; i < 3; i++) {
                    const phase = t + i * 1.2;
                    const drift = (phase % 3) * 20;
                    const alpha = Math.max(0, 1 - (phase % 3) / 3);
                    const size = 14 + i * 4;
                    ctx.font = `bold ${size}px monospace`;
                    ctx.fillStyle = `rgba(200,200,255,${alpha * 0.7})`;
                    ctx.fillText('z', posX + 35 + i * 12, posY - 40 - drift + i * 5);
                }
            }


            // --- FF9 Dialog Box (for alert, greeting, reporting) ---
            if (hasDialog) {
                const boxW = 280;
                const boxPad = 10;
                const lineH = 14;
                const nameH = 18;
                const charsPerLine = 36;

                // Get message text
                const dialogMessages = {
                    alert: 'Something needs your attention!',
                    greeting: 'Morning! Ready to get to work.',
                    reporting: 'Here\'s what happened while you were away.',
                };
                const msgText = lastKnownMessage || dialogMessages[currentState] || '';

                // Word-wrap text into lines
                const words = msgText.split(' ');
                const lines = [];
                let currentLine = '';
                for (const word of words) {
                    const test = currentLine ? currentLine + ' ' + word : word;
                    if (test.length > charsPerLine && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = test;
                    }
                }
                if (currentLine) lines.push(currentLine);

                // Max 6 lines so box doesn't overflow the circular display
                const maxLines = 8;
                const visibleLines = lines.slice(0, maxLines);

                // Dynamic box height: name + lines + padding
                const boxH = nameH + visibleLines.length * lineH + boxPad * 2;

                const boxX = (CANVAS_SIZE - boxW) / 2;
                const boxY = drawY - boxH - 8;  // above Zidane's head

                // Clamp: don't let box go above safe zone (circular display)
                const minBoxTop = 45;
                const clampedBoxY = Math.max(boxY, minBoxTop);

                // Rounded rect helper
                const r = 6;
                function roundedRect(bx, by, bw, bh) {
                    ctx.beginPath();
                    ctx.moveTo(bx + r, by);
                    ctx.lineTo(bx + bw - r, by);
                    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
                    ctx.lineTo(bx + bw, by + bh - r);
                    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh);
                    ctx.lineTo(bx + r, by + bh);
                    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r);
                    ctx.lineTo(bx, by + r);
                    ctx.quadraticCurveTo(bx, by, bx + r, by);
                    ctx.closePath();
                }

                // Light gray base fill
                roundedRect(boxX, clampedBoxY, boxW, boxH);
                ctx.fillStyle = '#707880';
                ctx.fill();

                // Static sand-like dots
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let dy = 0; dy < boxH; dy += 2) {
                    for (let dx = 0; dx < boxW; dx += 2) {
                        const seed = (dx * 7 + dy * 13 + dx * dy) & 0xFF;
                        if (seed < 40) {
                            ctx.fillRect(boxX + dx, clampedBoxY + dy, 1, 1);
                        }
                    }
                }

                // Border
                roundedRect(boxX, clampedBoxY, boxW, boxH);
                ctx.strokeStyle = '#888888';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Speech tail triangle — bottom-right, pointing down toward Zidane
                const tailX = boxX + boxW * 0.75;  // 6/8 = 75% from left
                const tailW = 12;
                const tailH = 14;
                // Fill triangle (same gray as box)
                ctx.fillStyle = '#707880';
                ctx.beginPath();
                ctx.moveTo(tailX, clampedBoxY + boxH);
                ctx.lineTo(tailX + tailW, clampedBoxY + boxH);
                ctx.lineTo(tailX + 2, clampedBoxY + boxH + tailH);
                ctx.closePath();
                ctx.fill();
                // Add dots to triangle to match texture
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let ty = 0; ty < tailH; ty += 2) {
                    for (let tx = 0; tx < tailW; tx += 2) {
                        const seed = (tx * 7 + ty * 13 + tx * ty) & 0xFF;
                        if (seed < 40) {
                            ctx.fillRect(tailX + tx, clampedBoxY + boxH + ty, 1, 1);
                        }
                    }
                }
                // Border on triangle sides (not the top edge which merges with box)
                ctx.strokeStyle = '#888888';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(tailX, clampedBoxY + boxH);
                ctx.lineTo(tailX + 2, clampedBoxY + boxH + tailH);
                ctx.lineTo(tailX + tailW, clampedBoxY + boxH);
                ctx.stroke();

                // Clip text to box
                ctx.save();
                ctx.beginPath();
                ctx.rect(boxX, clampedBoxY, boxW, boxH);
                ctx.clip();

                // "Zidane:" in green
                ctx.font = 'bold 13px monospace';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'left';
                ctx.fillText('Zidane', boxX + boxPad, clampedBoxY + boxPad + 12);

                // Message lines in white
                ctx.font = '12px monospace';
                ctx.fillStyle = '#FFFFFF';
                for (let i = 0; i < visibleLines.length; i++) {
                    ctx.fillText(visibleLines[i], boxX + boxPad, clampedBoxY + boxPad + nameH + 10 + i * lineH);
                }

                ctx.restore();
            }

            frameTick++;
            if (frameTick % 8 === 0) {
                animFrame = (animFrame + 1) % anim.frames.length;
            }
        }

        async function loadSprite() {
            spriteImg = new Image();
            spriteImg.src = '/sprites/zidane';
            await new Promise(r => { spriteImg.onload = r; spriteImg.onerror = r; });
            try {
                const fRes = await fetch('/frames/zidane');
                framesData = await fRes.json();
            } catch(e) { framesData = null; }
            // Load background sheet
            bgSheetImg = new Image();
            bgSheetImg.src = '/backgrounds';
            await new Promise(r => { bgSheetImg.onload = r; bgSheetImg.onerror = () => { bgSheetImg = null; r(); }; });
            if (!animTimer) {
                animTimer = setInterval(drawFrame, 50);
            }
        }


        // State controls
        const states = ['idle', 'working', 'waiting', 'alert', 'greeting', 'sleeping', 'reporting'];
        const controlsEl = document.getElementById('state-controls');
        states.forEach(s => {
            const btn = document.createElement('button');
            btn.textContent = s;
            btn.onclick = async () => {
                await fetch('/api/agent-state', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({state: s})
                });
                updateStatus();
            };
            controlsEl.appendChild(btn);
        });

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await fetch('/api/message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, level: 'info'})
            });
            // Switch to reporting so the FF9 dialog box shows the message
            await fetch('/api/agent-state', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({state: 'reporting'})
            });
            lastKnownMessage = text;
            currentState = 'reporting';
            input.value = '';
            updateStatus();
        }
        document.getElementById('msg-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();

                currentState = d.agent_state || 'idle';

                const badge = document.getElementById('state-badge');
                badge.textContent = currentState;
                badge.className = 'state-badge state-' + currentState;

                document.getElementById('person-status').textContent = d.person_present ? 'Present' : 'Away';
                document.getElementById('uptime').textContent = formatUptime(d.uptime_seconds);
                document.getElementById('rssi').textContent = d.wifi_rssi + ' dBm';
                document.getElementById('last-msg').textContent = d.last_message || 'None';

                // Update state control buttons
                document.querySelectorAll('.state-controls button').forEach(btn => {
                    btn.className = btn.textContent === currentState ? 'active' : '';
                });

                if (d.last_message) {
                    lastKnownMessage = d.last_message;
                }

                const tRes = await fetch('/api/timeline');
                const timeline = await tRes.json();
                document.getElementById('timeline').innerHTML = timeline.map(t =>
                    '<div class="comment">' + escHtml(t) + '</div>'
                ).join('');
            } catch(e) { console.error(e); }
        }

        let lastKnownMessage = '';
        function formatUptime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
        }
        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function rebootWatcher() {
            if (!confirm('Reboot the Watcher?')) return;
            try {
                await fetch('http://10.0.0.40/api/reboot', { method: 'POST', mode: 'no-cors' });
            } catch(e) {}
            alert('Reboot command sent. Wait ~10 seconds for reconnect.');
        }

        loadSprite();
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
