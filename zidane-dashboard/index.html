<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidane Watcher</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <h1>Zidane</h1>
        <span class="subtitle">OpenClaw Desk Companion</span>
    </div>
    <main>
        <div class="sprite-display">
            <div class="watch-bezel">
                <div class="watch-screen" id="watch-screen">
                    <canvas id="sprite-canvas" width="400" height="400"></canvas>
                    <div class="dialog-overlay" id="dialog-overlay">
                        <div class="name">Zidane:</div>
                        <div class="text" id="dialog-text"></div>
                    </div>
                </div>
            </div>
        </div>
        <div style="text-align:center">
            <div class="state-badge" id="state-badge">idle</div>
        </div>
        <div class="status-card">
            <div class="stat">
                <span class="label">Person</span>
                <span id="person-status">--</span>
            </div>
            <div class="stat">
                <span class="label">Uptime</span>
                <span id="uptime">--</span>
            </div>
            <div class="stat">
                <span class="label">WiFi RSSI</span>
                <span id="rssi">--</span>
            </div>
            <div class="stat">
                <span class="label">Last Msg</span>
                <span id="last-msg">--</span>
            </div>
        </div>

        <h2>State Control</h2>
        <div class="state-controls" id="state-controls"></div>

        <h2>Send Message</h2>
        <div class="message-input">
            <input type="text" id="msg-input" placeholder="Type a message..." maxlength="80">
            <button onclick="sendMessage()">Send</button>
        </div>

        <h2>Timeline</h2>
        <div id="timeline"></div>
    </main>
    <script>
        let spriteImg = null;
        let framesData = null;
        let currentState = 'idle';

        // Animation state
        let animFrame = 0;
        let animName = 'idle_down';
        let animTimer = null;

        const CANVAS_SIZE = 400;
        const DRAW_SCALE = 7;  // FFRK sprites are 16x24, scale up to ~112x168
        const SPRITE_HALF = 8 * DRAW_SCALE;
        const CENTER = CANVAS_SIZE / 2;
        const MOVE_RADIUS = CENTER - SPRITE_HALF - 15;

        let posX = CENTER, posY = CENTER;
        let facing = 'down';
        let state = 'idle';
        let stateTimer = 0;
        let walkDir = { x: 0, y: 0 };
        let walkStepsLeft = 0;

        // Agent state behaviors (matching firmware)
        const STATE_BEHAVIOR = {
            idle:      { walkChance: 0.03, turnChance: 0.02, walkSteps: [6,14],  speed: 1.5, bounceAmp: 0, pauseTicks: [30,80],  bgColor: '#FDE8C8' },
            working:   { walkChance: 0.05, turnChance: 0.03, walkSteps: [8,16],  speed: 1.5, bounceAmp: 0, pauseTicks: [20,50],  bgColor: '#E8F0E8' },
            waiting:   { walkChance: 0.005,turnChance: 0.015,walkSteps: [2,5],   speed: 0.8, bounceAmp: 0, pauseTicks: [80,200], bgColor: '#E8E0F0' },
            alert:     { walkChance: 0.08, turnChance: 0.05, walkSteps: [10,25], speed: 3.0, bounceAmp: 4, pauseTicks: [5,15],   bgColor: '#402020' },
            greeting:  { walkChance: 0, turnChance: 0, walkSteps: [0,0],  speed: 0, bounceAmp: 0, pauseTicks: [100,200],  bgColor: '#FFF0C0' },
            sleeping:  { walkChance: 0.003,turnChance: 0.005,walkSteps: [2,5],   speed: 0.5, bounceAmp: 0, pauseTicks: [100,250],bgColor: '#404060' },
            reporting: { walkChance: 0.01, turnChance: 0.01, walkSteps: [3,6],   speed: 1.0, bounceAmp: 0, pauseTicks: [50,100], bgColor: '#FDE8C8' },
        };

        const DIRS = ['down', 'up', 'left', 'right'];
        const DIR_VEC = { down: {x:0,y:1}, up: {x:0,y:-1}, left: {x:-1,y:0}, right: {x:1,y:0} };

        function getAnim(name) {
            return framesData && framesData.animations && framesData.animations[name];
        }
        function setAnim(name) {
            if (animName === name) return;
            animName = name;
            animFrame = 0;
        }

        function clampPos() {
            // Circular boundary
            const dx = posX - CENTER;
            const dy = posY - CENTER;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > MOVE_RADIUS) {
                const scale = MOVE_RADIUS / dist;
                posX = CENTER + dx * scale;
                posY = CENTER + dy * scale;
            }
        }

        function atBoundary() {
            const dx = posX - CENTER;
            const dy = posY - CENTER;
            return Math.sqrt(dx * dx + dy * dy) >= MOVE_RADIUS - 5;
        }

        function pickWalkDir() {
            const toCenter = { x: CENTER - posX, y: CENTER - posY };
            const dist = Math.sqrt(toCenter.x * toCenter.x + toCenter.y * toCenter.y);
            if (dist > 40 && Math.random() < 0.6) {
                facing = Math.abs(toCenter.x) > Math.abs(toCenter.y)
                    ? (toCenter.x > 0 ? 'right' : 'left')
                    : (toCenter.y > 0 ? 'down' : 'up');
            } else {
                facing = DIRS[Math.floor(Math.random() * 4)];
            }
            walkDir = DIR_VEC[facing];
        }

        // States with dedicated animations (skip walk/idle behavior)
        const FIXED_ANIM_STATES = {
            sleeping: 'sleeping',
            alert: 'alert',
            reporting: 'reporting',
            waiting: 'waiting',
            greeting: 'greeting',
        };

        function behaviorTick() {
            const b = STATE_BEHAVIOR[currentState] || STATE_BEHAVIOR.idle;
            stateTimer++;

            // Fixed-animation states: no wandering, just play the animation
            if (FIXED_ANIM_STATES[currentState]) {
                setAnim(FIXED_ANIM_STATES[currentState]);
                return;
            }

            switch (state) {
            case 'idle':
                setAnim('idle_' + facing);
                if (Math.random() < b.turnChance) {
                    facing = DIRS[Math.floor(Math.random() * 4)];
                    setAnim('idle_' + facing);
                    state = 'pausing'; stateTimer = 0;
                } else if (Math.random() < b.walkChance) {
                    pickWalkDir();
                    const [min, max] = b.walkSteps;
                    walkStepsLeft = min + Math.floor(Math.random() * (max - min));
                    state = 'walking'; stateTimer = 0;
                }
                break;
            case 'walking':
                setAnim('walk_' + facing);
                posX += walkDir.x * b.speed;
                posY += walkDir.y * b.speed;
                clampPos();
                walkStepsLeft--;
                if (walkStepsLeft <= 0 || atBoundary()) {
                    state = 'pausing'; stateTimer = 0;
                    setAnim('idle_' + facing);
                }
                break;
            case 'pausing':
                setAnim('idle_' + facing);
                const [pMin, pMax] = b.pauseTicks;
                if (stateTimer > pMin + Math.random() * (pMax - pMin)) {
                    state = 'idle'; stateTimer = 0;
                }
                break;
            }
        }

        let frameTick = 0;
        function drawFrame() {
            if (!spriteImg || !framesData) return;
            behaviorTick();
            clampPos();

            const canvas = document.getElementById('sprite-canvas');
            const ctx = canvas.getContext('2d');
            const anim = getAnim(animName);
            if (!anim) return;

            const frame = anim.frames[animFrame];
            // Per-frame width override (sleeping frames are 15px wide)
            const fw = frame.w || framesData.frame_width;
            const fh = framesData.frame_height;

            const b = STATE_BEHAVIOR[currentState] || STATE_BEHAVIOR.idle;

            // States that show the FF9 dialog box (sprite shifts up)
            const DIALOG_STATES = ['alert', 'greeting', 'reporting'];
            const hasDialog = DIALOG_STATES.includes(currentState);

            // Fill background with state color
            ctx.fillStyle = b.bgColor;
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Bounce
            const bounceY = b.bounceAmp > 0 ? Math.sin(frameTick * 0.3) * b.bounceAmp : 0;

            // Shift sprite up when dialog is visible
            const dialogShiftY = hasDialog ? -55 : 0;

            const drawW = fw * DRAW_SCALE;
            const drawH = fh * DRAW_SCALE;
            const drawX = posX - drawW / 2;
            const drawY = posY - drawH / 2 + bounceY + dialogShiftY;

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(spriteImg, frame.x, frame.y, fw, fh, drawX, drawY, drawW, drawH);

            // --- Status bubbles and overlays ---

            // ZZZ for sleeping — floating z's that drift upward
            if (currentState === 'sleeping') {
                const t = frameTick * 0.04;
                ctx.font = 'bold 16px monospace';
                for (let i = 0; i < 3; i++) {
                    const phase = t + i * 1.2;
                    const drift = (phase % 3) * 20;
                    const alpha = Math.max(0, 1 - (phase % 3) / 3);
                    const size = 14 + i * 4;
                    ctx.font = `bold ${size}px monospace`;
                    ctx.fillStyle = `rgba(200,200,255,${alpha * 0.7})`;
                    ctx.fillText('z', posX + 35 + i * 12, posY - 40 - drift + i * 5);
                }
            }

            // Speech cloud bubble for alert — red tint
            if (currentState === 'alert') {
                const bobY = Math.sin(frameTick * 0.15) * 3;
                const bx = posX + 40, by = posY - 70 + dialogShiftY + bobY;

                // Cloud shape
                ctx.fillStyle = '#FFDDDD';
                ctx.beginPath();
                ctx.arc(bx, by, 14, 0, Math.PI * 2);
                ctx.arc(bx - 10, by + 4, 10, 0, Math.PI * 2);
                ctx.arc(bx + 10, by + 4, 10, 0, Math.PI * 2);
                ctx.arc(bx - 5, by - 6, 9, 0, Math.PI * 2);
                ctx.arc(bx + 7, by - 6, 9, 0, Math.PI * 2);
                ctx.fill();

                // Tail
                ctx.beginPath();
                ctx.arc(bx - 8, by + 16, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx - 12, by + 22, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // "!!" text
                ctx.font = 'bold 18px monospace';
                ctx.fillStyle = '#CC0000';
                ctx.textAlign = 'center';
                ctx.fillText('!!', bx, by + 5);
                ctx.textAlign = 'left';
            }

            // Speech cloud bubble for greeting
            if (currentState === 'greeting') {
                const bobY = Math.sin(frameTick * 0.12) * 3;
                const bx = posX + 40, by = posY - 70 + dialogShiftY + bobY;

                // Cloud shape — overlapping circles
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(bx, by, 14, 0, Math.PI * 2);
                ctx.arc(bx - 10, by + 4, 10, 0, Math.PI * 2);
                ctx.arc(bx + 10, by + 4, 10, 0, Math.PI * 2);
                ctx.arc(bx - 5, by - 6, 9, 0, Math.PI * 2);
                ctx.arc(bx + 7, by - 6, 9, 0, Math.PI * 2);
                ctx.fill();

                // Tail — small circles pointing down toward Zidane
                ctx.beginPath();
                ctx.arc(bx - 8, by + 16, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx - 12, by + 22, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // "Hi!" text
                ctx.font = 'bold 14px monospace';
                ctx.fillStyle = '#FF6600';
                ctx.textAlign = 'center';
                ctx.fillText('Hi!', bx, by + 5);
                ctx.textAlign = 'left';
            }

            // --- FF9 Dialog Box (for alert, greeting, reporting) ---
            if (hasDialog) {
                const boxW = 280;
                const boxH = 56;
                const boxX = (CANVAS_SIZE - boxW) / 2;
                const boxY = CANVAS_SIZE - 90;

                // FF9 grainy gray background
                const r = 6;
                ctx.beginPath();
                ctx.moveTo(boxX + r, boxY);
                ctx.lineTo(boxX + boxW - r, boxY);
                ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + r);
                ctx.lineTo(boxX + boxW, boxY + boxH - r);
                ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - r, boxY + boxH);
                ctx.lineTo(boxX + r, boxY + boxH);
                ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - r);
                ctx.lineTo(boxX, boxY + r);
                ctx.quadraticCurveTo(boxX, boxY, boxX + r, boxY);
                ctx.closePath();

                // Light gray base fill
                ctx.fillStyle = '#707880';
                ctx.fill();

                // Static sand-like black dots (seeded from position so they don't move)
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let dy = 0; dy < boxH; dy += 2) {
                    for (let dx = 0; dx < boxW; dx += 2) {
                        // Pseudo-random from position (deterministic = no flicker)
                        const seed = (dx * 7 + dy * 13 + dx * dy) & 0xFF;
                        if (seed < 40) {
                            ctx.fillRect(boxX + dx, boxY + dy, 1, 1);
                        }
                    }
                }

                // Redraw rounded rect border on top of noise
                ctx.beginPath();
                ctx.moveTo(boxX + r, boxY);
                ctx.lineTo(boxX + boxW - r, boxY);
                ctx.quadraticCurveTo(boxX + boxW, boxY, boxX + boxW, boxY + r);
                ctx.lineTo(boxX + boxW, boxY + boxH - r);
                ctx.quadraticCurveTo(boxX + boxW, boxY + boxH, boxX + boxW - r, boxY + boxH);
                ctx.lineTo(boxX + r, boxY + boxH);
                ctx.quadraticCurveTo(boxX, boxY + boxH, boxX, boxY + boxH - r);
                ctx.lineTo(boxX, boxY + r);
                ctx.quadraticCurveTo(boxX, boxY, boxX + r, boxY);
                ctx.closePath();

                // Border — lighter gray like FF9
                ctx.strokeStyle = '#888888';
                ctx.lineWidth = 2;
                ctx.stroke();

                // "Zidane:" name label in green
                ctx.font = 'bold 13px monospace';
                ctx.fillStyle = '#7BE87B';
                ctx.textAlign = 'left';
                ctx.fillText('Zidane:', boxX + 10, boxY + 16);

                // Message text in white
                const dialogMessages = {
                    alert: 'Something needs your attention!',
                    greeting: 'Morning! Ready to get to work.',
                    reporting: 'Here\'s what happened while you were away.',
                };
                // Use last_message if available, otherwise default
                const msgText = lastKnownMessage || dialogMessages[currentState] || '';
                ctx.font = '12px monospace';
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(msgText.substring(0, 40), boxX + 10, boxY + 36);
                if (msgText.length > 40) {
                    ctx.fillText(msgText.substring(40, 80), boxX + 10, boxY + 50);
                }
            }

            frameTick++;
            if (frameTick % 8 === 0) {
                animFrame = (animFrame + 1) % anim.frames.length;
            }
        }

        async function loadSprite() {
            spriteImg = new Image();
            spriteImg.src = '/sprites/zidane';
            await new Promise(r => { spriteImg.onload = r; spriteImg.onerror = r; });
            try {
                const fRes = await fetch('/frames/zidane');
                framesData = await fRes.json();
            } catch(e) { framesData = null; }
            if (!animTimer) {
                animTimer = setInterval(drawFrame, 50);
            }
        }

        // Dialog box
        let dialogTimeout = null;
        function showDialog(text, level) {
            const overlay = document.getElementById('dialog-overlay');
            document.getElementById('dialog-text').textContent = text;
            overlay.className = 'dialog-overlay visible level-' + (level || 'info');
            clearTimeout(dialogTimeout);
            dialogTimeout = setTimeout(() => {
                overlay.className = 'dialog-overlay';
            }, 10000);
        }

        // State controls
        const states = ['idle', 'working', 'waiting', 'alert', 'greeting', 'sleeping', 'reporting'];
        const controlsEl = document.getElementById('state-controls');
        states.forEach(s => {
            const btn = document.createElement('button');
            btn.textContent = s;
            btn.onclick = async () => {
                await fetch('/api/agent-state', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({state: s})
                });
                updateStatus();
            };
            controlsEl.appendChild(btn);
        });

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            await fetch('/api/message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, level: 'info'})
            });
            showDialog(text, 'success');
            input.value = '';
            updateStatus();
        }
        document.getElementById('msg-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();

                currentState = d.agent_state || 'idle';

                const badge = document.getElementById('state-badge');
                badge.textContent = currentState;
                badge.className = 'state-badge state-' + currentState;

                document.getElementById('person-status').textContent = d.person_present ? 'Present' : 'Away';
                document.getElementById('uptime').textContent = formatUptime(d.uptime_seconds);
                document.getElementById('rssi').textContent = d.wifi_rssi + ' dBm';
                document.getElementById('last-msg').textContent = d.last_message || 'None';

                // Update state control buttons
                document.querySelectorAll('.state-controls button').forEach(btn => {
                    btn.className = btn.textContent === currentState ? 'active' : '';
                });

                // Show dialog if there's a new message
                if (d.last_message && d.last_message !== lastKnownMessage) {
                    showDialog(d.last_message, 'info');
                    lastKnownMessage = d.last_message;
                }

                const tRes = await fetch('/api/timeline');
                const timeline = await tRes.json();
                document.getElementById('timeline').innerHTML = timeline.map(t =>
                    '<div class="comment">' + escHtml(t) + '</div>'
                ).join('');
            } catch(e) { console.error(e); }
        }

        let lastKnownMessage = '';
        function formatUptime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
        }
        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        loadSprite();
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
