<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidane Watcher</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Courier New',monospace; background:#0a0a1e; color:#e0e0e0; max-width:500px; margin:0 auto; padding:16px; }
        h1 { font-size:20px; color:#7BE87B; margin-bottom:4px; }
        .sub { font-size:12px; color:#5566AA; margin-bottom:16px; }
        .card { background:linear-gradient(180deg,#1a1a4e,#0f0f2e); border:1px solid #2a2a5e; border-radius:12px; padding:14px; margin-bottom:12px; }
        .stat { display:flex; align-items:center; gap:10px; padding:5px 0; font-size:13px; }
        .label { color:#5566AA; min-width:80px; }
        .badge { display:inline-block; padding:3px 12px; border-radius:10px; font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; }
        .s-idle { background:#FDE8C8; color:#1a1a2e; }
        .s-working { background:#55AA66; color:#1a1a2e; }
        .s-waiting { background:#AAAA55; color:#1a1a2e; }
        .s-alert { background:#AA5555; color:#fff; }
        .s-greeting { background:#FFF0C0; color:#1a1a2e; }
        .s-sleeping { background:#636e72; color:#fff; }
        .s-reporting { background:#5566AA; color:#fff; }
        .btns { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
        .btns button { background:#1a1a4e; color:#7BE87B; border:1px solid #2a2a5e; padding:6px 10px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:11px; }
        .btns button:hover { background:#2a2a5e; }
        .btns button.on { background:#5566AA; color:#fff; border-color:#7788cc; }
        .msg-row { display:flex; gap:6px; margin:12px 0; }
        .msg-row input { flex:1; padding:7px 10px; background:#1a1a4e; border:1px solid #2a2a5e; border-radius:6px; color:#e0e0e0; font-family:inherit; font-size:12px; }
        .msg-row button { background:#55AA66; color:#0a0a1e; border:none; padding:7px 14px; border-radius:6px; cursor:pointer; font-weight:bold; font-family:inherit; }
        .reboot { background:#AA5555; color:#fff; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:bold; width:100%; margin-top:12px; }
        .reboot:hover { background:#cc6666; }
        h2 { font-size:13px; color:#5566AA; text-transform:uppercase; letter-spacing:1px; margin:14px 0 6px; }
    </style>
</head>
<body>
    <h1>Zidane</h1>
    <div class="sub">OpenClaw Desk Companion</div>

    <div class="card">
        <div class="stat"><span class="label">State</span><span class="badge" id="state-badge">--</span></div>
        <div class="stat"><span class="label">Person</span><span id="person">--</span></div>
        <div class="stat"><span class="label">Uptime</span><span id="uptime">--</span></div>
        <div class="stat"><span class="label">WiFi</span><span id="rssi">--</span></div>
        <div class="stat"><span class="label">Last Msg</span><span id="msg">--</span></div>
    </div>

    <h2>State</h2>
    <div class="btns" id="btns"></div>

    <h2>Message</h2>
    <div class="msg-row">
        <input id="txt" placeholder="Send message..." maxlength="200">
        <button onclick="sendMsg()">Send</button>
    </div>

    <button class="reboot" onclick="reboot()">Reboot Watcher</button>

    <script>
        const STATES = ['idle','working','waiting','alert','greeting','sleeping','reporting'];
        let cur = 'idle';

        // Build state buttons
        const el = document.getElementById('btns');
        STATES.forEach(s => {
            const b = document.createElement('button');
            b.textContent = s;
            b.onclick = async () => {
                await fetch('/api/agent-state', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({state:s}) });
                poll();
            };
            el.appendChild(b);
        });

        async function sendMsg() {
            const inp = document.getElementById('txt');
            const t = inp.value.trim();
            if (!t) return;
            await fetch('/api/message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t, level:'info'}) });
            inp.value = '';
            poll();
        }
        document.getElementById('txt').addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });

        async function reboot() {
            if (!confirm('Reboot the Watcher?')) return;
            try { await fetch('/api/reboot', { method:'POST' }); } catch(e) {}
            document.body.innerHTML = '<div style="text-align:center;margin-top:40vh;color:#7BE87B;font-family:monospace"><h2>Rebooting...</h2><p>Refresh in 10 seconds</p></div>';
        }

        async function poll() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                cur = d.agent_state || 'idle';
                const b = document.getElementById('state-badge');
                b.textContent = cur;
                b.className = 'badge s-' + cur;
                document.getElementById('person').textContent = d.person_present ? 'Present' : 'Away';
                document.getElementById('uptime').textContent = fmt(d.uptime_seconds);
                document.getElementById('rssi').textContent = (d.wifi_rssi || '--') + ' dBm';
                document.getElementById('msg').textContent = d.last_message || 'None';
                document.querySelectorAll('.btns button').forEach(b => b.className = b.textContent === cur ? 'on' : '');
            } catch(e) {}
        }
        function fmt(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?h+'h '+m+'m':m+'m'; }
        poll();
        setInterval(poll, 5000);
    </script>
</body>
</html>
