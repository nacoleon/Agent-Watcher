<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéWatcher</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <a href="/" class="active">Status</a>
        <a href="/roster">Roster</a>
        <a href="/settings">Settings</a>
    </nav>
    <main>
        <div class="sprite-display" id="sprite-display">
            <div class="watch-bezel">
                <div class="watch-screen">
                    <canvas id="sprite-canvas" width="400" height="400"></canvas>
                </div>
            </div>
        </div>
        <h1 id="pokemon-name">Loading...</h1>
        <div class="mood-badge" id="mood-badge">--</div>
        <div class="status-card">
            <div class="stat">
                <span class="label">Person</span>
                <span id="person-status">--</span>
            </div>
            <div class="stat">
                <span class="label">Evolution</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="evo-bar"></div>
                </div>
                <span id="evo-text">--</span>
            </div>
        </div>
        <h2>Commentary</h2>
        <div id="timeline"></div>
    </main>
    <script src="/app.js"></script>
    <script>
        let spriteImg = null;
        let framesData = null;
        let currentPokemon = '';
        let currentMood = 'happy';

        // Animation state
        let animFrame = 0;
        let animName = 'idle_down';
        let animTimer = null;

        // Canvas is 400x400 to match the real 412x412 watch display
        // Sprite drawn at 8x scale (32*8=256px) — fills most of the screen
        const CANVAS_SIZE = 400;
        const DRAW_SCALE = 8;
        const SPRITE_HALF = 16 * DRAW_SCALE;
        const POS_MIN = SPRITE_HALF + 10;
        const POS_MAX = CANVAS_SIZE - SPRITE_HALF - 10;
        const CENTER = CANVAS_SIZE / 2;

        // Position
        let posX = CENTER, posY = CENTER;
        let facing = 'down';

        // State machine: idle, turning, walking, pausing
        let state = 'idle';
        let stateTimer = 0;
        let walkDir = { x: 0, y: 0 };
        let walkStepsLeft = 0;

        // Mood-driven behavior
        const MOOD_BEHAVIOR = {
            excited:   { walkChance: 0.06, turnChance: 0.04, walkSteps: [8,20],  speed: 2.5, bounceAmp: 3, pauseTicks: [10,30] },
            happy:     { walkChance: 0.03, turnChance: 0.02, walkSteps: [6,14],  speed: 1.5, bounceAmp: 0, pauseTicks: [30,80] },
            curious:   { walkChance: 0.02, turnChance: 0.06, walkSteps: [4,10],  speed: 1.0, bounceAmp: 0, pauseTicks: [20,50] },
            lonely:    { walkChance: 0.01, turnChance: 0.01, walkSteps: [3,8],   speed: 0.8, bounceAmp: 0, pauseTicks: [60,150] },
            sleepy:    { walkChance: 0.003,turnChance: 0.005,walkSteps: [2,5],   speed: 0.5, bounceAmp: 0, pauseTicks: [100,250] },
            overjoyed: { walkChance: 0.08, turnChance: 0.05, walkSteps: [10,25], speed: 3.0, bounceAmp: 4, pauseTicks: [5,15] },
        };

        const DIRS = ['down', 'up', 'left', 'right'];
        const DIR_VEC = { down: {x:0,y:1}, up: {x:0,y:-1}, left: {x:-1,y:0}, right: {x:1,y:0} };

        function getAnim(name) {
            return framesData && framesData.animations && framesData.animations[name];
        }

        function setAnim(name) {
            if (animName === name) return;
            animName = name;
            animFrame = 0;
        }

        function clampPos() {
            posX = Math.max(POS_MIN, Math.min(POS_MAX, posX));
            posY = Math.max(POS_MIN, Math.min(POS_MAX, posY));
        }

        function pickWalkDir() {
            // Prefer directions that keep us near center
            const toCenter = { x: CENTER - posX, y: CENTER - posY };
            const distFromCenter = Math.sqrt(toCenter.x * toCenter.x + toCenter.y * toCenter.y);

            // 60% chance to walk toward center if far away, otherwise random
            if (distFromCenter > 40 && Math.random() < 0.6) {
                if (Math.abs(toCenter.x) > Math.abs(toCenter.y)) {
                    facing = toCenter.x > 0 ? 'right' : 'left';
                } else {
                    facing = toCenter.y > 0 ? 'down' : 'up';
                }
            } else {
                facing = DIRS[Math.floor(Math.random() * 4)];
            }
            walkDir = DIR_VEC[facing];
        }

        function behaviorTick() {
            const b = MOOD_BEHAVIOR[currentMood] || MOOD_BEHAVIOR.happy;
            stateTimer++;

            switch (state) {
            case 'idle':
                setAnim('idle_' + facing);
                // Randomly decide to do something
                if (Math.random() < b.turnChance) {
                    // Just look a different direction
                    facing = DIRS[Math.floor(Math.random() * 4)];
                    setAnim('idle_' + facing);
                    state = 'pausing';
                    stateTimer = 0;
                } else if (Math.random() < b.walkChance) {
                    // Start a short walk
                    pickWalkDir();
                    const [min, max] = b.walkSteps;
                    walkStepsLeft = min + Math.floor(Math.random() * (max - min));
                    state = 'walking';
                    stateTimer = 0;
                }
                break;

            case 'walking':
                setAnim('walk_' + facing);
                posX += walkDir.x * b.speed;
                posY += walkDir.y * b.speed;
                clampPos();
                walkStepsLeft--;

                // Stop if we hit the edge or finished steps
                if (walkStepsLeft <= 0 || posX <= POS_MIN || posX >= POS_MAX || posY <= POS_MIN || posY >= POS_MAX) {
                    state = 'pausing';
                    stateTimer = 0;
                    setAnim('idle_' + facing);
                }
                break;

            case 'pausing':
                setAnim('idle_' + facing);
                const [pMin, pMax] = b.pauseTicks;
                if (stateTimer > pMin + Math.random() * (pMax - pMin)) {
                    state = 'idle';
                    stateTimer = 0;
                }
                break;
            }
        }

        let frameTick = 0;
        function drawFrame() {
            if (!spriteImg || !framesData) return;

            behaviorTick();
            clampPos();

            const canvas = document.getElementById('sprite-canvas');
            const ctx = canvas.getContext('2d');
            const anim = getAnim(animName);
            if (!anim) return;

            const frame = anim.frames[animFrame];
            const fw = framesData.frame_width;
            const fh = framesData.frame_height;

            // Clear to transparent
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Bounce effect for excited/overjoyed
            const b = MOOD_BEHAVIOR[currentMood] || MOOD_BEHAVIOR.happy;
            const bounceY = b.bounceAmp > 0 ? Math.sin(frameTick * 0.3) * b.bounceAmp : 0;

            // Draw sprite centered at position
            const drawW = fw * DRAW_SCALE;
            const drawH = fh * DRAW_SCALE;
            const drawX = posX - drawW / 2;
            const drawY = posY - drawH / 2 + bounceY;

            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(spriteImg, frame.x, frame.y, fw, fh, drawX, drawY, drawW, drawH);

            // Advance sprite frame — slow cycle for 2-frame walk (every 6 ticks = ~300ms)
            frameTick++;
            if (frameTick % 6 === 0) {
                animFrame = (animFrame + 1) % anim.frames.length;
            }
        }

        async function loadSprite(pokemonId, mood) {
            if (currentPokemon !== pokemonId) {
                currentPokemon = pokemonId;
                spriteImg = new Image();
                spriteImg.src = '/sprites/' + pokemonId;
                await new Promise(r => { spriteImg.onload = r; spriteImg.onerror = r; });
                try {
                    const fRes = await fetch('/frames/' + pokemonId);
                    framesData = await fRes.json();
                } catch(e) { framesData = null; }
            }
            currentMood = mood;
            if (!animTimer) {
                animTimer = setInterval(drawFrame, 50);
                drawFrame();
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status');
                const d = await res.json();
                document.getElementById('pokemon-name').textContent = d.active_pokemon || 'No Pokemon';
                document.getElementById('mood-badge').textContent = d.mood;
                document.getElementById('mood-badge').className = 'mood-badge mood-' + d.mood;
                document.getElementById('person-status').textContent = d.person_present ? 'Here' : 'Away';
                const hours = (d.evolution_seconds / 3600).toFixed(1);
                const threshold = d.evolution_threshold_hours || 24;
                const pct = Math.min(100, (d.evolution_seconds / (threshold * 3600)) * 100);
                document.getElementById('evo-bar').style.width = pct + '%';
                document.getElementById('evo-text').textContent = hours + 'h / ' + threshold + 'h';

                if (d.active_pokemon) loadSprite(d.active_pokemon, d.mood);

                const tRes = await fetch('/api/timeline');
                const timeline = await tRes.json();
                const el = document.getElementById('timeline');
                el.innerHTML = timeline.map(t => '<div class="comment">' + escHtml(t) + '</div>').join('');
            } catch(e) { console.error(e); }
        }
        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        updateStatus();
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
