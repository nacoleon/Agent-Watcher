<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zidane Watcher</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Courier New',monospace; background:#0a0a1e; color:#e0e0e0; max-width:500px; margin:0 auto; padding:16px; }
        h1 { font-size:20px; color:#7BE87B; margin-bottom:4px; }
        .sub { font-size:12px; color:#5566AA; margin-bottom:16px; }
        .card { background:linear-gradient(180deg,#1a1a4e,#0f0f2e); border:1px solid #2a2a5e; border-radius:12px; padding:14px; margin-bottom:12px; }
        .stat { display:flex; align-items:center; gap:10px; padding:5px 0; font-size:13px; }
        .label { color:#5566AA; min-width:80px; }
        .badge { display:inline-block; padding:3px 12px; border-radius:10px; font-size:12px; font-weight:bold; text-transform:uppercase; letter-spacing:1px; }
        .s-idle { background:#FDE8C8; color:#1a1a2e; }
        .s-working { background:#55AA66; color:#1a1a2e; }
        .s-waiting { background:#AAAA55; color:#1a1a2e; }
        .s-alert { background:#AA5555; color:#fff; }
        .s-greeting { background:#FFF0C0; color:#1a1a2e; }
        .s-sleeping { background:#636e72; color:#fff; }
        .s-reporting { background:#5566AA; color:#fff; }
        .s-down { background:#2A2A2A; color:#fff; }
        .s-wakeup { background:#CE93D8; color:#1a1a2e; }
        .btns { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
        .btns button { background:#1a1a4e; color:#7BE87B; border:1px solid #2a2a5e; padding:6px 10px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:11px; }
        .btns button:hover { background:#2a2a5e; }
        .btns button.on { background:#5566AA; color:#fff; border-color:#7788cc; }
        .msg-row { display:flex; gap:6px; margin:12px 0; }
        .msg-row input { flex:1; padding:7px 10px; background:#1a1a4e; border:1px solid #2a2a5e; border-radius:6px; color:#e0e0e0; font-family:inherit; font-size:12px; }
        .msg-row button { background:#55AA66; color:#0a0a1e; border:none; padding:7px 14px; border-radius:6px; cursor:pointer; font-weight:bold; font-family:inherit; }
        .reboot { background:#AA5555; color:#fff; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-family:inherit; font-weight:bold; width:100%; margin-top:12px; }
        .reboot:hover { background:#cc6666; }
        h2 { font-size:13px; color:#5566AA; text-transform:uppercase; letter-spacing:1px; margin:14px 0 6px; }
    </style>
</head>
<body>
    <h1>Zidane</h1>
    <div class="sub">OpenClaw Desk Companion</div>

    <div class="card">
        <div class="stat"><span class="label">State</span><span class="badge" id="state-badge">--</span></div>
        <div class="stat"><span class="label">Person</span><span id="person">--</span></div>
        <div class="stat"><span class="label">Uptime</span><span id="uptime">--</span></div>
        <div class="stat"><span class="label">WiFi</span><span id="rssi">--</span></div>
        <div class="stat"><span class="label">Last Msg</span><span id="msg">--</span></div>
    </div>

    <h2>State</h2>
    <div class="btns" id="btns"></div>

    <h2>Message</h2>
    <div class="msg-row">
        <input id="txt" placeholder="Send message..." maxlength="1000" oninput="updateCount()">
        <button onclick="sendMsg()">Send</button>
    </div>
    <div id="char-count" style="font-size:11px;color:#5566AA;margin-top:4px;">0 / 160</div>

    <h2>Background: <span id="bg-current">#16</span></h2>
    <div class="msg-row">
        <button onclick="setBg('prev')">Prev</button>
        <button onclick="setBg('next')">Next</button>
        <input id="bg-idx" type="number" min="1" max="83" placeholder="#" style="width:50px;flex:none;">
        <button onclick="setBg()">Go</button>
        <button id="rotate-btn" onclick="toggleRotate()" style="margin-left:auto;">Rotate: ON</button>
    </div>

    <h2>Heartbeat</h2>
    <div class="card" id="hb-card" style="font-size:12px;">
        <div class="stat"><span class="label">Status</span><span id="hb-status">--</span></div>
        <div id="hb-log" style="margin-top:6px;color:#5566AA;"></div>
    </div>

    <h2 id="ai-title">AI Model: Person Detection</h2>
    <div class="btns" id="model-btns"></div>
    <div class="card" style="font-size:12px;">
        <div id="ai-log" style="color:#5566AA;">No events yet</div>
        <div id="ai-expand" style="text-align:center;margin-top:6px;display:none;">
            <button onclick="toggleAiLog()" id="ai-expand-btn" style="background:none;border:1px solid #2a2a5e;color:#5566AA;padding:3px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;">Show more</button>
        </div>
    </div>

    <button class="reboot" onclick="reboot()">Reboot Watcher</button>

    <script>
        const STATES = ['idle','working','waiting','alert','greeting','sleeping','reporting','down','wakeup'];
        const MODELS = [{id:1,name:'Person'},{id:2,name:'Pet'},{id:3,name:'Gesture'}];
        const BG_TILES = [2,3,7,8,10,12,13,16,20,24,29,32,33,34,37,38,41,42,43,44,49,53,56,57,60,66,69,71,72,74,76,77,80,83];
        let curBg = 16;
        let cur = 'idle';
        let curModel = 1;
        let aiLogExpanded = false;
        function toggleAiLog() {
            aiLogExpanded = !aiLogExpanded;
            document.getElementById('ai-expand-btn').textContent = aiLogExpanded ? 'Show less' : 'Show more';
            poll();
        }

        // Build model buttons
        const mEl = document.getElementById('model-btns');
        MODELS.forEach(m => {
            const b = document.createElement('button');
            b.textContent = m.name;
            b.id = 'model-' + m.id;
            b.onclick = async () => {
                await fetch('/api/model', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:m.id}) });
                poll();
            };
            mEl.appendChild(b);
        });

        // Build state buttons
        const el = document.getElementById('btns');
        STATES.forEach(s => {
            const b = document.createElement('button');
            b.textContent = s;
            b.onclick = async () => {
                await fetch('/api/agent-state', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({state:s}) });
                poll();
            };
            el.appendChild(b);
        });

        async function sendMsg() {
            const inp = document.getElementById('txt');
            const t = inp.value.trim();
            if (!t) return;
            await fetch('/api/message', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t, level:'info'}) });
            inp.value = '';
            poll();
        }
        document.getElementById('txt').addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
        function updateCount() {
            const inp = document.getElementById('txt');
            const cnt = document.getElementById('char-count');
            const len = inp.value.length;
            cnt.textContent = len + ' / 1000';
            cnt.style.color = len >= 1000 ? '#AA5555' : len >= 800 ? '#AAAA55' : '#5566AA';
        }

        async function setBg(dir) {
            let idx = curBg;
            if (dir === 'prev' || dir === 'next') {
                let pos = BG_TILES.indexOf(curBg);
                if (pos < 0) pos = 0;
                if (dir === 'prev') pos = (pos - 1 + BG_TILES.length) % BG_TILES.length;
                if (dir === 'next') pos = (pos + 1) % BG_TILES.length;
                idx = BG_TILES[pos];
            } else {
                idx = parseInt(document.getElementById('bg-idx').value) || curBg;
                document.getElementById('bg-idx').value = '';
            }
            await fetch('/api/background', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({index:idx}) });
            poll();
        }

        async function toggleRotate() {
            const btn = document.getElementById('rotate-btn');
            const on = btn.textContent.includes('ON');
            await fetch('/api/background', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({auto_rotate:!on}) });
            poll();
        }

        async function reboot() {
            if (!confirm('Reboot the Watcher?')) return;
            try { await fetch('/api/reboot', { method:'POST' }); } catch(e) {}
            document.body.innerHTML = '<div style="text-align:center;margin-top:40vh;color:#7BE87B;font-family:monospace"><h2>Rebooting...</h2><p>Refresh in 10 seconds</p></div>';
        }

        async function poll() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                cur = d.agent_state || 'idle';
                const b = document.getElementById('state-badge');
                b.textContent = cur;
                b.className = 'badge s-' + cur;
                document.getElementById('person').textContent = d.person_present ? 'Present' : 'Away';
                document.getElementById('uptime').textContent = fmt(d.uptime_seconds);
                document.getElementById('rssi').textContent = (d.wifi_rssi || '--') + ' dBm';
                document.getElementById('msg').textContent = d.last_message || 'None';
                if (d.background > 0) { curBg = d.background; document.getElementById('bg-current').textContent = '#' + d.background; }
                const rb = document.getElementById('rotate-btn');
                rb.textContent = 'Rotate: ' + (d.auto_rotate ? 'ON' : 'OFF');
                rb.className = d.auto_rotate ? 'on' : '';
                document.querySelectorAll('#btns button').forEach(b => b.className = b.textContent === cur ? 'on' : '');

                // Heartbeat log
                const uptimeMs = d.uptime_seconds * 1000;
                const hbStatus = document.getElementById('hb-status');
                const hbLog = document.getElementById('hb-log');
                if (d.last_heartbeat_ms > 0) {
                    const agoMs = uptimeMs - d.last_heartbeat_ms;
                    const agoMin = Math.floor(agoMs / 60000);
                    hbStatus.textContent = agoMin + 'm ago';
                    hbStatus.style.color = agoMin > 90 ? '#AA5555' : '#7BE87B';
                } else {
                    hbStatus.textContent = 'No heartbeat yet';
                    hbStatus.style.color = '#5566AA';
                }
                const log = d.heartbeat_log || [];
                hbLog.innerHTML = log.map((ms, i) => {
                    const ago = Math.floor((uptimeMs - ms) / 60000);
                    return (i === 0 ? '&#9679; ' : '&#9675; ') + ago + 'm ago';
                }).join('<br>') || 'No heartbeats recorded';

                // AI model title + buttons
                curModel = d.active_model || 1;
                document.getElementById('ai-title').textContent = 'AI Model: ' + (d.model_name || 'Person Detection');
                MODELS.forEach(m => {
                    const b = document.getElementById('model-' + m.id);
                    if (b) b.className = m.id === curModel ? 'on' : '';
                });

                // AI log — presence for person/pet, gestures for gesture model
                const aiEl = document.getElementById('ai-log');
                const aiExpand = document.getElementById('ai-expand');
                const limit = aiLogExpanded ? 20 : 5;
                if (curModel === 3) {
                    const gLog = (d.gesture_log || []).slice(0, limit);
                    const total = (d.gesture_log || []).length;
                    aiEl.innerHTML = gLog.map(e => {
                        const ago = Math.floor((uptimeMs - e.ms) / 60000);
                        if (e.gesture === 'Arrived' || e.gesture === 'Left') {
                            const icon = e.gesture === 'Arrived' ? '\u{1F7E3}' : '\u26AB';
                            const label = e.gesture === 'Arrived' ? 'Object Arrived' : 'Object Left';
                            const color = e.gesture === 'Arrived' ? '#CE93D8' : '#636e72';
                            return icon + ' <span style="color:' + color + '">' + label + '</span> ' + ago + 'm ago';
                        }
                        const icons = {'Paper':'\u{1F590}\uFE0F','Rock':'\u270A\uFE0F','Scissors':'\u270C\uFE0F'};
                        const icon = icons[e.gesture] || '\u{1F440}';
                        return icon + ' <b>' + e.gesture + '</b> (score:' + e.score + ') ' + ago + 'm ago';
                    }).join('<br>') || 'No events yet';
                    aiExpand.style.display = total > 5 ? '' : 'none';
                } else {
                    const pLog = (d.presence_log || []).slice(0, limit);
                    const total = (d.presence_log || []).length;
                    aiEl.innerHTML = pLog.map(e => {
                        const ago = Math.floor((uptimeMs - e.ms) / 60000);
                        const icon = e.arrived ? '&#9650;' : '&#9660;';
                        const color = e.arrived ? '#7BE87B' : '#AA5555';
                        const label = e.arrived ? 'Arrived' : 'Left';
                        return '<span style="color:' + color + '">' + icon + ' ' + label + '</span> ' + ago + 'm ago';
                    }).join('<br>') || 'No events yet';
                    aiExpand.style.display = total > 5 ? '' : 'none';
                }
            } catch(e) {}
        }
        function fmt(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?h+'h '+m+'m':m+'m'; }
        poll();
        setInterval(poll, 5000);
    </script>
</body>
</html>
